services:
  engine:
    build: .
    command: uv run python main.py
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_DIR: "/app/logs"
    volumes:
      - game-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  view:
    build: .
    command: uv run python -m view --port 8080 --file data/arena.json
    volumes:
      - game-data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - engine

volumes:
  game-data:
